<div class="break">
        {{ if eq .Title "Lunch" }}
        <a href={{ .RelPermalink }}>
                <span class="title">{{ .Title }}</span>
                <time class="time">{{ .Params.Time }}</time>
        </a>
        {{ else }}
                {{ if .Title }}
                <span class="title">{{ .Title }}</span>
                {{ end }}
                <time class="time">{{ .Params.Time }}</time>
        {{ end }}
</div>
