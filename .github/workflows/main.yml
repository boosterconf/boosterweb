name: auto-import program

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7,8,9,10,12,14,16,20 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      working-directory: ./program_import
      run: cargo run --locked
    - run: git add program
    - run: git commit -m "Automatic program import"
    - run: git push
